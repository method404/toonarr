services:
  toonarr:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Optional: set these to match your NAS user for bind-mounted folders.
      PUID: "${PUID:-}"
      PGID: "${PGID:-}"
    volumes:
      - toonarr-data:/app/data
    restart: unless-stopped

volumes:
  toonarr-data:
